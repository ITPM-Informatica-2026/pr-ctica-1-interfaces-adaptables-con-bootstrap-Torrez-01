<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>EJERCICIO 1</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: beige;
    }
    .navbar-custom {
      background: blue;
    }

    .hero {
      background:beige;
      padding: 50px;
      border-radius: 10px;
    }

    .hero img {
      width: 100%;
      border-radius: 10px;
    }

    .category {
      text-align: center;
      padding: 15px;
    }
    .category img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container">

    <a class="navbar-brand" href="#">FreshCart</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Alternar navegación">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Categorías</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Ofertas</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contactos</a></li>
      </ul>
    </div>

  </div>
</nav>

<main class="container mt-5">
  <div class="row hero align-items-center">
    <div class="col-md-6">
      <p class="text-muted">
        Los mejores productos frescos de la región.
      </p>
        <h1 class="fw-bold">
        Supermercado<br>
        para alimentos<br>
        frescos
      </h1>

      <p class="text-muted">
        Compra productos frescos de alta calidad para tu hogar.
      </p>

      <button type="button" class="btn btn-success">
        Compra ahora
      </button>
    </div>

    <div class="col-md-6 text-center">
      <img src="https://images.unsplash.com/photo-1542838132-92c53300491e"
           alt="Supermercado">
    </div>
  </div>

  <h5 class="mt-5">Categorías destacadas</h5>

  <div class="row mt-3 text-center">
    <div class="col-md-2 col-4 category">
      <img src="https://images.unsplash.com/photo-1619566636858-adf3ef46400b"
           alt="Frutas">
      <p>Frutas</p>
    </div>

    <div class="col-md-2 col-4 category">
      <img src="https://images.unsplash.com/photo-1518843875459-f738682238a6"
           alt="Verduras">
      <p>Verduras</p>
    </div>

    <div class="col-md-2 col-4 category">
      <img src="https://images.unsplash.com/photo-1563636619-e9143da7973b"
           alt="Lácteos">
      <p>Lácteos</p>
    </div>

    <div class="col-md-2 col-4 category">
      <img src="https://images.unsplash.com/photo-1607623814075-e51df1bdc82f"
           alt="Carnes">
      <p>Carnes</p>
    </div>

    <div class="col-md-2 col-4 category">
      <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff"
           alt="Panadería">
      <p>Panadería</p>
    </div>

    <div class="col-md-2 col-4 category">
      <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97"
           alt="Bebidas">
      <p>Bebidas</p>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
